<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Klartext DL/DR Editor</title>
<style>
  /* ---- design tokens : shop-terminal, derived from the TNC operator panel ---- */
  :root{
    --bg:#13171b; --panel:#1a2026; --panel2:#212a31; --raised:#27323b;
    --line:#2f3b45; --line2:#3a4a56;
    --txt:#cdd7df; --muted:#7f8d99; --faint:#5a6772;
    --blue:#3f7bf0;        /* TNC selection highlight */
    --blue-dim:#1d3a78;
    --green:#7cc063;       /* comments / structure / tool names */
    --cyan:#4cc2d4;        /* keywords */
    --amber:#e2a93f;       /* active / modified / deltas */
    --amber-dim:#4a3a16;
    --red:#d96b63;
    --mono:"JetBrains Mono","SFMono-Regular","Cascadia Code",ui-monospace,Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0; background:var(--bg); color:var(--txt);
    font-family:var(--mono); font-size:13px; line-height:1.45;
    display:flex; flex-direction:column; overflow:hidden;
  }
  /* ---- top bar ---- */
  header{
    flex:0 0 auto; display:flex; align-items:center; gap:14px;
    padding:9px 14px; background:linear-gradient(#1d242b,#171d22);
    border-bottom:1px solid var(--line); user-select:none;
  }
  .brand{display:flex; align-items:baseline; gap:9px; white-space:nowrap}
  .brand b{color:var(--amber); letter-spacing:.14em; font-weight:600; font-size:12px}
  .brand span{color:var(--faint); font-size:11px; letter-spacing:.08em}
  .file{
    flex:1 1 auto; min-width:0; color:var(--muted); font-size:12px;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }
  .file b{color:var(--txt); font-weight:500}
  .badge{
    color:var(--amber); border:1px solid var(--amber-dim); background:#22200f;
    padding:1px 8px; border-radius:10px; font-size:11px; white-space:nowrap;
  }
  .badge.zero{color:var(--faint); border-color:var(--line); background:transparent}
  button.btn{
    font-family:var(--mono); font-size:11.5px; letter-spacing:.05em;
    color:var(--txt); background:var(--raised); border:1px solid var(--line2);
    padding:6px 11px; border-radius:5px; cursor:pointer; white-space:nowrap;
  }
  button.btn:hover{background:#30404c; border-color:#46596a}
  button.btn:active{transform:translateY(1px)}
  button.btn.accent{border-color:var(--blue); color:#cfe0ff; background:#1b2d52}
  button.btn.accent:hover{background:#22386a}
  button.btn.danger:hover{border-color:var(--red); color:var(--red)}
  button.btn:disabled{opacity:.4; cursor:default; transform:none; background:var(--raised)}
  /* ---- main grid ---- */
  main{flex:1 1 auto; display:grid; grid-template-columns:280px minmax(0,1fr) minmax(0,1.05fr); min-height:0}
  .col{display:flex; flex-direction:column; min-height:0; min-width:0}
  .col + .col{border-left:1px solid var(--line)}
  .col-head{
    flex:0 0 auto; padding:8px 12px; background:var(--panel2);
    border-bottom:1px solid var(--line);
    font-size:10.5px; letter-spacing:.16em; color:var(--muted); text-transform:uppercase;
    display:flex; align-items:center; justify-content:space-between; gap:8px;
  }
  .col-head .count{color:var(--faint); letter-spacing:.05em}
  /* ---- structure legend (left) ---- */
  .filter{flex:0 0 auto; padding:8px; border-bottom:1px solid var(--line); background:var(--panel)}
  .filter input{
    width:100%; font-family:var(--mono); font-size:12px; color:var(--txt);
    background:var(--bg); border:1px solid var(--line2); border-radius:4px; padding:6px 8px;
  }
  .filter input:focus{outline:none; border-color:var(--blue)}
  #legend{flex:1 1 auto; overflow:auto}
  .sec{
    padding:8px 12px; border-bottom:1px solid #232c34; cursor:pointer;
    display:flex; align-items:flex-start; gap:8px;
  }
  .sec:hover{background:var(--panel2)}
  .sec.active{background:var(--blue-dim); box-shadow:inset 3px 0 0 var(--blue)}
  .sec .tick{color:var(--green); flex:0 0 auto; margin-top:1px}
  .sec .body{flex:1 1 auto; min-width:0}
  .sec .label{color:var(--green); white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .sec.active .label{color:#dff5d4}
  .sec .meta{color:var(--faint); font-size:10.5px; margin-top:2px; display:flex; gap:10px}
  .sec .dot{color:var(--amber)}
  /* ---- editor cards (center) ---- */
  #editor{flex:1 1 auto; overflow:auto; padding:12px}
  .empty{color:var(--faint); padding:32px 16px; text-align:center; font-size:12px}
  .empty kbd{color:var(--muted); border:1px solid var(--line2); border-radius:3px; padding:1px 5px}
  .card{background:var(--panel); border:1px solid var(--line); border-radius:7px; margin-bottom:12px; overflow:hidden}
  .card.modified{border-color:var(--amber-dim)}
  .card-head{
    display:flex; align-items:center; gap:10px; padding:9px 12px;
    background:var(--panel2); border-bottom:1px solid var(--line);
  }
  .blk{color:var(--faint); font-size:11px; flex:0 0 auto}
  .kw{color:var(--cyan); font-weight:600}
  .ref{color:var(--txt)}
  .ref.name{color:var(--green)}
  .card-head .cmt{color:var(--muted); font-size:11px; margin-left:auto; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; min-width:0}
  .fields{display:flex; flex-wrap:wrap; gap:14px; padding:12px}
  .field{display:flex; flex-direction:column; gap:5px}
  .field > label{font-size:10px; letter-spacing:.1em; color:var(--muted); text-transform:uppercase}
  .field .help{font-size:9.5px; color:var(--faint); letter-spacing:0; text-transform:none}
  .stepper{display:flex; align-items:stretch; border:1px solid var(--line2); border-radius:5px; overflow:hidden; background:var(--bg)}
  .stepper.set{border-color:var(--amber)}
  .stepper button{
    width:26px; border:none; background:var(--raised); color:var(--txt);
    cursor:pointer; font-family:var(--mono); font-size:14px;
  }
  .stepper button:hover{background:#34444f}
  .stepper input{
    width:78px; text-align:center; font-family:var(--mono); font-size:13px;
    color:var(--txt); background:transparent; border:none; padding:6px 4px;
    border-left:1px solid var(--line2); border-right:1px solid var(--line2);
  }
  .stepper.set input{color:var(--amber)}
  .stepper input:focus{outline:none}
  .stepper .unit{display:flex; align-items:center; padding:0 7px; color:var(--faint); font-size:10px}
  .field .was{font-size:10px; color:var(--faint); height:12px}
  .field .was b{color:var(--amber)}
  .preview{
    padding:8px 12px 11px; border-top:1px dashed var(--line);
    font-size:12px; color:var(--faint); display:flex; align-items:center; gap:10px;
  }
  .preview .line{flex:1 1 auto; min-width:0; overflow-x:auto; white-space:pre; color:var(--txt)}
  .preview .line .d{color:var(--amber); font-weight:600}
  .gobtn{
    flex:0 0 auto; font-size:10.5px; letter-spacing:.05em; color:var(--muted);
    background:transparent; border:1px solid var(--line2); border-radius:4px;
    padding:4px 9px; cursor:pointer;
  }
  .gobtn:hover{color:var(--txt); border-color:var(--blue)}
  /* ---- program view (right) ---- */
  #progWrap{flex:1 1 auto; overflow:auto; position:relative; background:#10141880}
  #progSpacer{position:relative; width:100%}
  #progSlice{position:absolute; left:0; right:0; top:0}
  .pl{display:flex; white-space:pre; padding:0 10px 0 0; height:20px; align-items:center}
  .pl .ln{flex:0 0 56px; text-align:right; padding-right:12px; color:var(--faint); user-select:none;
          border-right:1px solid #1f272e; margin-right:10px}
  .pl .src{flex:1 1 auto; overflow:hidden; text-overflow:ellipsis}
  .pl.active{background:var(--blue-dim); box-shadow:inset 3px 0 0 var(--blue)}
  .pl.active .ln{color:#9fc0ff}
  .pl.mod{box-shadow:inset 3px 0 0 var(--amber)}
  .pl.active.mod{box-shadow:inset 3px 0 0 var(--blue), inset 6px 0 0 var(--amber)}
  .t-cmt{color:var(--green); opacity:.8}
  .t-struct{color:var(--green); font-weight:600}
  .t-kw{color:var(--cyan)}
  .t-delta{color:var(--amber)}
  .drop{position:fixed; inset:0; background:#0c0f12cc; display:none; align-items:center; justify-content:center;
        z-index:30; pointer-events:none}
  .drop.show{display:flex}
  .drop div{border:2px dashed var(--blue); border-radius:12px; padding:48px 64px; color:#cfe0ff; letter-spacing:.1em}
  /* scrollbars */
  ::-webkit-scrollbar{width:10px; height:10px}
  ::-webkit-scrollbar-thumb{background:#2c3742; border-radius:5px}
  ::-webkit-scrollbar-thumb:hover{background:#3a4956}
  ::-webkit-scrollbar-track{background:transparent}
  @media (max-width:900px){ main{grid-template-columns:1fr} .col + .col{border-left:none; border-top:1px solid var(--line)} }
</style>
</head>
<body>
<header>
  <div class="brand"><b>KLARTEXT · DL/DR</b><span>tool-call offset editor</span></div>
  <div class="file" id="fileLabel">No program loaded — open a .H file or load the sample</div>
  <div class="badge zero" id="editBadge">0 edits</div>
  <button class="btn" id="openBtn">Open .H</button>
  <button class="btn" id="sampleBtn">Sample</button>
  <button class="btn danger" id="resetBtn" disabled>Reset</button>
  <button class="btn" id="copyBtn" disabled>Copy</button>
  <button class="btn accent" id="exportBtn" disabled>Export .H</button>
  <input type="file" id="fileInput" accept=".h,.H,.txt" hidden>
</header>

<main>
  <section class="col">
    <div class="col-head"><span>Structure</span><span class="count" id="secCount"></span></div>
    <div class="filter"><input id="filterInput" placeholder="filter sections…" spellcheck="false"></div>
    <div id="legend"></div>
  </section>

  <section class="col">
    <div class="col-head"><span>Tool calls</span><span class="count" id="callCount"></span></div>
    <div id="editor"><div class="empty">Select a section to edit its tool-call offsets.</div></div>
  </section>

  <section class="col">
    <div class="col-head"><span>Program</span><span class="count" id="lineCount"></span></div>
    <div id="progWrap"><div id="progSpacer"><div id="progSlice"></div></div></div>
  </section>
</main>

<div class="drop" id="drop"><div>Drop .H program</div></div>

<script>
"use strict";
/* =========================================================================
   Klartext DL/DR editor — parse a Heidenhain .H program, navigate by the
   structure (*) blocks that feed the control's Gliederung pane, and edit the
   DL / DR / DR2 deltas in each TOOL CALL without touching the rest of the line.
   ========================================================================= */

// ---- block grammar -------------------------------------------------------
const RE_STRUCT   = /^(\s*)(\d+)\s+\*\s?(.*)$/;            // structure block -> legend entry
const RE_TOOLCALL = /^(\s*)(\d+)\s+(TOOL CALL)\b(.*)$/;    // tool call block
const RE_TOOLREF  = /^\s*("(?:[^"]*)"|[^\s;]+)/;           // number  or  "quoted name"
const RE_COMMENT  = /;\s?(.*)$/;                           // trailing ; comment
// value-only capture (keep keyword + spacing on replace); DR excludes DR2
const RE_V = { DL:/(\bDL\s*)([+-]?\d+(?:\.\d+)?)/, DR:/(\bDR(?!2)\s*)([+-]?\d+(?:\.\d+)?)/, DR2:/(\bDR2\s*)([+-]?\d+(?:\.\d+)?)/ };
// whole-token capture (for removal); leading space swallowed so the line stays tidy
const RE_F = { DL:/\s*\bDL\s*[+-]?\d+(?:\.\d+)?/, DR:/\s*\bDR(?!2)\s*[+-]?\d+(?:\.\d+)?/, DR2:/\s*\bDR2\s*[+-]?\d+(?:\.\d+)?/ };
const KW_RE = /\b(TOOL CALL|TOOL DEF|CYCL DEF|CYCL CALL|CALL LBL|LBL|PLANE|FUNCTION|TCPM|BLK FORM|APPR|DEP|CC|RND|CHF|FN \d+)\b/g;

// ---- state ---------------------------------------------------------------
let lines = [];        // editable model (one string per source line)
let original = [];     // pristine copy for reset / "was" chips
let sections = [];     // [{ id, label, lineIndex, calls:[lineIndex,...] }]
let newline = "\n";
let fileName = "program.H";
let activeSection = null;
let activeLine = -1;

// ---- helpers -------------------------------------------------------------
function fmt(v){
  let n = Number(v);
  if(!isFinite(n)) return null;
  let s = (Math.round(n*1000)/1000).toString();
  if(n >= 0 && !s.startsWith("+")) s = "+" + s;     // Heidenhain always carries an explicit sign
  return s;
}
function parseCall(line){
  const m = line.match(RE_TOOLCALL);
  if(!m) return null;
  const blk = m[2], rest = m[4];
  const ref = (rest.match(RE_TOOLREF) || [,""])[1];
  const cmt = (rest.match(RE_COMMENT) || [,""])[1];
  const get = k => { const x = rest.match(RE_V[k]); return x ? x[2] : null; };
  return { blk, ref, comment:cmt, DL:get("DL"), DR:get("DR"), DR2:get("DR2") };
}
function isQuoted(ref){ return ref && ref.startsWith('"'); }

// surgical edit of one delta on one line; "" clears the token
function setField(idx, key, value){
  let line = lines[idx];
  if(value === "" || value == null){
    line = line.replace(RE_F[key], "");
  } else {
    const tok = key + fmt(value);
    if(RE_V[key].test(line)){
      line = line.replace(RE_V[key], "$1" + fmt(value));   // replace value, keep keyword + spacing
    } else {
      const c = line.search(/\s*;/);                       // insert before a trailing comment if present
      line = c >= 0 ? line.slice(0,c) + " " + tok + line.slice(c)
                    : line.replace(/\s*$/,"") + " " + tok;
    }
  }
  lines[idx] = line;
}

// ---- parsing -------------------------------------------------------------
function parse(text){
  newline = text.includes("\r\n") ? "\r\n" : "\n";
  lines = text.split(/\r?\n/);
  original = lines.slice();
  sections = [];
  let cur = null;
  lines.forEach((line, i) => {
    const s = line.match(RE_STRUCT);
    if(s){
      cur = { id:sections.length, label:s[3].replace(/^[-\s]+/,"").trim() || "(unnamed)", lineIndex:i, calls:[] };
      sections.push(cur);
      return;
    }
    if(RE_TOOLCALL.test(line)){
      if(!cur){ cur = { id:sections.length, label:"(program start)", lineIndex:i, calls:[] }; sections.push(cur); }
      cur.calls.push(i);
    }
  });
}

// ---- left : structure legend --------------------------------------------
const legendEl = document.getElementById("legend");
const filterEl = document.getElementById("filterInput");

function sectionEdits(sec){
  let n = 0;
  for(const idx of sec.calls) if(lines[idx] !== original[idx]) n++;
  return n;
}
function renderLegend(){
  const q = filterEl.value.trim().toLowerCase();
  const shown = sections.filter(s => s.calls.length && (!q || s.label.toLowerCase().includes(q)));
  legendEl.innerHTML = "";
  document.getElementById("secCount").textContent = shown.length + (q ? " / " + sections.filter(s=>s.calls.length).length : "");
  shown.forEach(sec => {
    const edits = sectionEdits(sec);
    const el = document.createElement("div");
    el.className = "sec" + (activeSection === sec.id ? " active" : "");
    el.innerHTML =
      '<span class="tick">*</span><div class="body">'
      + '<div class="label"></div>'
      + '<div class="meta"><span>' + sec.calls.length + (sec.calls.length===1?' call':' calls') + '</span>'
      + (edits ? '<span class="dot">● ' + edits + ' edited</span>' : '') + '</div></div>';
    el.querySelector(".label").textContent = sec.label;
    el.onclick = () => selectSection(sec.id);
    legendEl.appendChild(el);
  });
}

// ---- center : tool-call editor ------------------------------------------
const editorEl = document.getElementById("editor");

function fieldHTML(idx, key, label, help){
  const cur = parseCall(lines[idx])[key];
  const set = cur !== null;
  return ''
    + '<div class="field">'
    +   '<label>' + label + ' <span class="help">' + help + '</span></label>'
    +   '<div class="stepper' + (set ? ' set' : '') + '" data-key="' + key + '">'
    +     '<button data-step="-0.01" title="−0.01">−</button>'
    +     '<input type="text" inputmode="decimal" value="' + (set ? cur : "") + '" placeholder="—">'
    +     '<button data-step="0.01" title="+0.01">+</button>'
    +     '<span class="unit">mm</span>'
    +   '</div>'
    +   '<div class="was"></div>'
    + '</div>';
}
function selectSection(id){
  activeSection = id;
  const sec = sections[id];
  renderLegend();
  document.getElementById("callCount").textContent = sec.calls.length + " in “" + sec.label + "”";
  editorEl.innerHTML = "";
  if(!sec.calls.length){ editorEl.innerHTML = '<div class="empty">No tool calls in this section.</div>'; return; }

  sec.calls.forEach(idx => {
    const c = parseCall(lines[idx]);
    const card = document.createElement("div");
    card.className = "card" + (lines[idx] !== original[idx] ? " modified" : "");
    card.dataset.idx = idx;
    const refName = isQuoted(c.ref);
    card.innerHTML =
      '<div class="card-head">'
      +  '<span class="blk">BLK ' + c.blk + '</span>'
      +  '<span class="kw">TOOL CALL</span> <span class="ref' + (refName?' name':'') + '"></span>'
      +  '<span class="cmt"></span>'
      + '</div>'
      + '<div class="fields">'
      +   fieldHTML(idx,"DL","DL","length oversize")
      +   fieldHTML(idx,"DR","DR","radius oversize")
      +   fieldHTML(idx,"DR2","DR2","corner-radius")
      + '</div>'
      + '<div class="preview"><span class="line"></span>'
      +   '<button class="gobtn" data-go="' + idx + '">Go to line ' + (idx) + '</button></div>';
    card.querySelector(".ref").textContent = c.ref || "?";
    const cmtTxt = c.comment || (refName ? "" : sec.label);
    card.querySelector(".cmt").textContent = cmtTxt ? "; " + cmtTxt : "";
    editorEl.appendChild(card);
    wireCard(card, idx);
    refreshCard(card, idx);
  });
}
function wireCard(card, idx){
  card.querySelectorAll(".stepper").forEach(st => {
    const key = st.dataset.key;
    const input = st.querySelector("input");
    st.querySelectorAll("button").forEach(b => {
      b.onclick = () => {
        const step = parseFloat(b.dataset.step);
        const base = input.value.trim() === "" ? 0 : (parseFloat(input.value) || 0);
        commit(card, idx, key, (Math.round((base + step) * 1000) / 1000).toString());
      };
    });
    input.addEventListener("change", () => commit(card, idx, key, input.value.trim()));
    input.addEventListener("keydown", e => { if(e.key === "Enter") input.blur(); });
  });
  card.querySelector("[data-go]").onclick = () => gotoLine(idx);
}
function commit(card, idx, key, value){
  if(value !== "" && !isFinite(Number(value))) return;     // ignore junk, keep prior value
  setField(idx, key, value);
  card.classList.toggle("modified", lines[idx] !== original[idx]);
  refreshCard(card, idx);
  renderLegend();
  drawProgram();
  updateChrome();
}
function refreshCard(card, idx){
  const c = parseCall(lines[idx]);
  const o = parseCall(original[idx]) || {};
  ["DL","DR","DR2"].forEach(key => {
    const st = card.querySelector('.stepper[data-key="' + key + '"]');
    const input = st.querySelector("input");
    const set = c[key] !== null;
    if(document.activeElement !== input) input.value = set ? c[key] : "";
    st.classList.toggle("set", set);
    const was = st.parentElement.querySelector(".was");
    const ov = o[key], nv = c[key];
    was.innerHTML = (ov !== nv) ? ('was ' + (ov===null?"—":ov) + ' → <b>' + (nv===null?"—":nv) + '</b>') : "";
  });
  // live preview of the rewritten block, deltas highlighted
  card.querySelector(".preview .line").innerHTML = highlight(lines[idx]);
}

// ---- right : virtualized program view -----------------------------------
const wrap = document.getElementById("progWrap");
const spacer = document.getElementById("progSpacer");
const slice = document.getElementById("progSlice");
const ROW = 20;
function esc(s){ return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function highlight(line){
  let h = esc(line);
  if(RE_STRUCT.test(line))        return '<span class="t-struct">' + h + '</span>';
  if(/^\s*\d+\s+;/.test(line) || /^\s*;/.test(line))
                                  return '<span class="t-cmt">' + h + '</span>';
  h = h.replace(KW_RE, '<span class="t-kw">$1</span>');
  h = h.replace(/\b(DL|DR2|DR)\s*[+-]?\d+(?:\.\d+)?/g, '<span class="t-delta">$&</span>');
  return h;
}
function drawProgram(){
  spacer.style.height = (lines.length * ROW) + "px";
  const top = wrap.scrollTop, h = wrap.clientHeight;
  const first = Math.max(0, Math.floor(top / ROW) - 6);
  const last  = Math.min(lines.length, Math.ceil((top + h) / ROW) + 6);
  slice.style.top = (first * ROW) + "px";
  let html = "";
  for(let i = first; i < last; i++){
    const cls = "pl" + (i === activeLine ? " active" : "") + (lines[i] !== original[i] ? " mod" : "");
    html += '<div class="' + cls + '"><span class="ln">' + i + '</span><span class="src">' + highlight(lines[i]) + '</span></div>';
  }
  slice.innerHTML = html;
}
wrap.addEventListener("scroll", drawProgram);
function gotoLine(idx){
  activeLine = idx;
  const target = idx * ROW - wrap.clientHeight / 2 + ROW;
  wrap.scrollTop = Math.max(0, target);
  drawProgram();
}

// ---- chrome / load / export ---------------------------------------------
function updateChrome(){
  let n = 0;
  for(let i = 0; i < lines.length; i++) if(lines[i] !== original[i]) n++;
  const b = document.getElementById("editBadge");
  b.textContent = n + (n === 1 ? " edit" : " edits");
  b.classList.toggle("zero", n === 0);
  document.getElementById("resetBtn").disabled = n === 0;
  document.getElementById("exportBtn").disabled = !lines.length;
  document.getElementById("copyBtn").disabled = !lines.length;
  document.getElementById("lineCount").textContent = lines.length + " blocks";
}
function load(text, name){
  fileName = name || fileName;
  parse(text);
  activeSection = null; activeLine = -1;
  document.getElementById("fileLabel").innerHTML = "<b>" + esc(fileName) + "</b>";
  filterEl.value = "";
  renderLegend();
  editorEl.innerHTML = '<div class="empty">Select a section on the left to edit its tool-call offsets.<br><br>'
    + sections.filter(s=>s.calls.length).length + ' sections · '
    + sections.reduce((a,s)=>a+s.calls.length,0) + ' tool calls found.</div>';
  drawProgram();
  updateChrome();
  // open the first section that actually carries calls
  const first = sections.find(s => s.calls.length);
  if(first) selectSection(first.id);
}
function exportText(){ return lines.join(newline); }
function download(){
  const blob = new Blob([exportText()], {type:"text/plain"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = fileName;
  a.click();
  URL.revokeObjectURL(a.href);
}

document.getElementById("openBtn").onclick = () => document.getElementById("fileInput").click();
document.getElementById("fileInput").onchange = e => {
  const f = e.target.files[0]; if(!f) return;
  const r = new FileReader();
  r.onload = () => load(r.result, f.name);
  r.readAsText(f);
};
document.getElementById("exportBtn").onclick = download;
document.getElementById("copyBtn").onclick = () => {
  navigator.clipboard.writeText(exportText());
  const btn = document.getElementById("copyBtn"); const t = btn.textContent;
  btn.textContent = "Copied"; setTimeout(() => btn.textContent = t, 1100);
};
document.getElementById("resetBtn").onclick = () => {
  lines = original.slice();
  if(activeSection !== null) selectSection(activeSection);
  renderLegend(); drawProgram(); updateChrome();
};
filterEl.addEventListener("input", renderLegend);

// drag + drop
const drop = document.getElementById("drop");
window.addEventListener("dragover", e => { e.preventDefault(); drop.classList.add("show"); });
window.addEventListener("dragleave", e => { if(e.relatedTarget === null) drop.classList.remove("show"); });
window.addEventListener("drop", e => {
  e.preventDefault(); drop.classList.remove("show");
  const f = e.dataTransfer.files[0]; if(!f) return;
  const r = new FileReader(); r.onload = () => load(r.result, f.name); r.readAsText(f);
});
